<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>BoI not found · BoI Wiki</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div>
      <h1>BoI not found or not accessible</h1>
      <p>요청한 BoI 문서를 찾을 수 없거나 현재 사번으로 접근할 수 없습니다.</p>
    </div>
    <div class="user-box">
      사번: {{ employee_id }}<br />
      <a href="/?employee_id={{ employee_id }}">BoI 목록</a>
    </div>
  </header>
  <main class="missing-doc">
    <section class="empty-state">
      <strong>BoI not found or not accessible</strong>
      <p><code>{{ boi_id }}</code></p>
      <p>문서 파일이 삭제됐거나 권한 범위 밖에 있습니다. Event Stream에서 생성된 BoI라면 materialized log payload가 남아 있을 때만 복구 렌더링됩니다.</p>
      <p><a href="/events?employee_id={{ employee_id }}">Event Stream으로 돌아가기</a></p>
    </section>
  </main>
</body>
</html>
