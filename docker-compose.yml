name: boi-poc

services:
  langflow-postgres:
    image: postgres:16-alpine
    container_name: boi-langflow-postgres
    environment:
      POSTGRES_USER: ${LANGFLOW_POSTGRES_USER:-langflow}
      POSTGRES_PASSWORD: ${LANGFLOW_POSTGRES_PASSWORD:-langflow}
      POSTGRES_DB: ${LANGFLOW_POSTGRES_DB:-langflow}
    volumes:
      - langflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFLOW_POSTGRES_USER:-langflow} -d ${LANGFLOW_POSTGRES_DB:-langflow}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [boi-net]

  langflow:
    image: ${LANGFLOW_IMAGE:-langflowai/langflow:latest}
    container_name: boi-langflow
    depends_on:
      langflow-postgres:
        condition: service_healthy
    ports:
      - "${LANGFLOW_PORT:-7860}:7860"
    environment:
      LANGFLOW_DATABASE_URL: postgresql://${LANGFLOW_POSTGRES_USER:-langflow}:${LANGFLOW_POSTGRES_PASSWORD:-langflow}@langflow-postgres:5432/${LANGFLOW_POSTGRES_DB:-langflow}
      LANGFLOW_CONFIG_DIR: /tmp/langflow
      LANGFLOW_COMPONENTS_PATH: /app/custom_components
      LANGFLOW_API_KEY_SOURCE: env
      LANGFLOW_API_KEY: ${LANGFLOW_API_KEY:-dev-langflow-key-change-me}
      ACTION_GATEWAY_URL: http://action-gateway:8100
      ACTION_GATEWAY_SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      BOI_API_SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      AUTO_INVOKE_ACTIONS_FOR_EVENTS: ${AUTO_INVOKE_ACTIONS_FOR_EVENTS:-true}
      LANGFLOW_WEBHOOK_AUTH_ENABLE: "True"
      # Local PoC convenience. For intranet deployment, set False and put behind SSO/reverse proxy.
      LANGFLOW_AUTO_LOGIN: ${LANGFLOW_AUTO_LOGIN:-True}
      LANGFLOW_SKIP_AUTH_AUTO_LOGIN: ${LANGFLOW_SKIP_AUTH_AUTO_LOGIN:-true}
      LANGFLOW_SUPERUSER: ${LANGFLOW_SUPERUSER:-admin}
      LANGFLOW_SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD:-admin}
      LANGFLOW_SECRET_KEY: ${LANGFLOW_SECRET_KEY:-Ym9pLXdpa2ktcG9jLWRldi1zZWNyZXQta2V5LTIwMjY=}
      BOI_LLM_BASE_URL: ${BOI_LLM_BASE_URL:-http://llm-gateway.example:1236/v1}
      BOI_LLM_MODEL: ${BOI_LLM_MODEL:-google/gemma-4-26b-a4b-qat}
      BOI_LLM_API_KEY: ${BOI_LLM_API_KEY:-not-needed}
      OPENAI_API_BASE: ${BOI_LLM_BASE_URL:-http://llm-gateway.example:1236/v1}
      OPENAI_API_BASE_URL: ${BOI_LLM_BASE_URL:-http://llm-gateway.example:1236/v1}
      OPENAI_API_KEY: ${BOI_LLM_API_KEY:-not-needed}
    volumes:
      - ./langflow/custom_components:/app/custom_components:ro
    networks: [boi-net]

  kafka:
    image: apache/kafka:3.7.0
    container_name: boi-kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks: [boi-net]

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: boi-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -e
        for topic in boi.events boi.audit boi.dead-letter; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:9092 \
            --create --if-not-exists \
            --topic $$topic \
            --partitions 3 \
            --replication-factor 1
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    networks: [boi-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: boi-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: boi-poc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks: [boi-net]

  boi-api:
    build:
      context: ./boi_api
    container_name: boi-api
    command: >
      sh -c 'if [ "${BOI_API_WORKERS:-1}" = "1" ]; then
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000;
      else
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers "${BOI_API_WORKERS:-1}";
      fi'
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${BOI_API_PORT:-8000}:8000"
    environment:
      DATA_ROOT: /data/boi
      EVENTS_ROOT: /data/events
      EVENT_CATALOG_ROOT: /data/event_catalog
      ACTION_CATALOG_ROOT: /data/action_catalog
      ACTION_LOG_ROOT: /data/actions
      ACTION_GATEWAY_URL: http://action-gateway:8100
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      BOI_AUTH_MODE: ${BOI_AUTH_MODE:-dev}
      BOI_EXTERNAL_URL: ${BOI_EXTERNAL_URL:-http://localhost:8000}
      LANGFLOW_EXTERNAL_URL: ${LANGFLOW_EXTERNAL_URL:-}
      KAFKA_UI_EXTERNAL_URL: ${KAFKA_UI_EXTERNAL_URL:-}
      BOI_WIKI_MCP_EXTERNAL_URL: ${BOI_WIKI_MCP_EXTERNAL_URL:-}
      ACTION_GATEWAY_EXTERNAL_URL: ${ACTION_GATEWAY_EXTERNAL_URL:-}
      BOI_SESSION_SECRET: ${BOI_SESSION_SECRET:-dev-boi-session-secret-change-me}
      BOI_COOKIE_SECURE: ${BOI_COOKIE_SECURE:-false}
      BOI_ALLOWED_EMPLOYEE_IDS: ${BOI_ALLOWED_EMPLOYEE_IDS:-}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-}
      KEYCLOAK_EXTERNAL_SERVER_URL: ${KEYCLOAK_EXTERNAL_SERVER_URL:-}
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:-}
      KEYCLOAK_EMPLOYEE_CLAIM: ${KEYCLOAK_EMPLOYEE_CLAIM:-}
      KEYCLOAK_HCP_API_URL: ${KEYCLOAK_HCP_API_URL:-}
      KEYCLOAK_ALLOWED_EMPLOYEE: ${KEYCLOAK_ALLOWED_EMPLOYEE:-}
      KEYCLOAK_ADMIN_EMPLOYEES: ${KEYCLOAK_ADMIN_EMPLOYEES:-}
      HCP_AUTHZ_URL: ${HCP_AUTHZ_URL:-}
      HCP_AUTHZ_CACHE_TTL_SECONDS: ${HCP_AUTHZ_CACHE_TTL_SECONDS:-60}
      DEFAULT_TEAM_ID: ${DEFAULT_TEAM_ID:-aix-tf}
      KAFKA_BOOTSTRAP: kafka:9092
      BOI_EVENTS_TOPIC: boi.events
      DEMO_EMPLOYEE_ID: ${DEMO_EMPLOYEE_ID:-100001}
      BOI_LLM_BASE_URL: ${BOI_LLM_BASE_URL:-http://llm-gateway.example:1236/v1}
      BOI_LLM_MODEL: ${BOI_LLM_MODEL:-google/gemma-4-26b-a4b-qat}
      BOI_LLM_API_KEY: ${BOI_LLM_API_KEY:-not-needed}
    volumes:
      - ./data/boi:/data/boi
      - ./data/events:/data/events
      - ./data/event_catalog:/data/event_catalog:ro
      - ./data/action_catalog:/data/action_catalog:ro
      - ./data/actions:/data/actions
    networks: [boi-net]


  action-gateway:
    build:
      context: ./action_gateway
    container_name: boi-action-gateway
    depends_on:
      boi-api:
        condition: service_started
    ports:
      - "${ACTION_GATEWAY_PORT:-8100}:8100"
    environment:
      ACTION_CATALOG_ROOT: /data/action_catalog
      ACTION_LOG_ROOT: /data/actions
      BOI_API_URL: http://boi-api:8000
      LANGFLOW_URL: http://langflow:7860
      LANGFLOW_API_KEY: ${LANGFLOW_API_KEY:-dev-langflow-key-change-me}
      LANGFLOW_AUTH_MODE: ${LANGFLOW_AUTH_MODE:-api-key}
      MCP_BRIDGE_URL: ${MCP_BRIDGE_URL:-}
      TIMESFM_MCP_URL: ${TIMESFM_MCP_URL:-}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      ACTION_DRY_RUN_DEFAULT: ${ACTION_DRY_RUN_DEFAULT:-true}
      ACTION_ALLOWED_HOSTS: ${ACTION_ALLOWED_HOSTS:-boi-api,langflow,action-gateway,localhost,127.0.0.1,mcp-bridge,boi-wiki-mcp}
      BOI_LLM_BASE_URL: ${BOI_LLM_BASE_URL:-http://llm-gateway.example:1236/v1}
      BOI_LLM_MODEL: ${BOI_LLM_MODEL:-google/gemma-4-26b-a4b-qat}
      BOI_LLM_API_KEY: ${BOI_LLM_API_KEY:-not-needed}
    volumes:
      - ./data/action_catalog:/data/action_catalog:ro
      - ./data/actions:/data/actions
    networks: [boi-net]

  boi-wiki-mcp:
    build:
      context: ./boi_wiki_mcp
    container_name: boi-wiki-mcp
    depends_on:
      boi-api:
        condition: service_started
      action-gateway:
        condition: service_started
    ports:
      - "${BOI_WIKI_MCP_PORT:-8200}:8200"
    environment:
      BOI_API_URL: http://boi-api:8000
      ACTION_GATEWAY_URL: http://action-gateway:8100
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      DEFAULT_EMPLOYEE_ID: ${DEMO_EMPLOYEE_ID:-100001}
      BOI_WIKI_MCP_EXTERNAL_URL: ${BOI_WIKI_MCP_EXTERNAL_URL:-}
    networks: [boi-net]

  event-router:
    build:
      context: ./event_adapter
    container_name: boi-event-router
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      boi-api:
        condition: service_started
      action-gateway:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      BOI_EVENTS_TOPIC: boi.events
      EVENT_ROUTER_GROUP_ID: ${EVENT_ROUTER_GROUP_ID:-boi-event-router}
      EVENT_ROUTER_AUTO_OFFSET_RESET: ${EVENT_ROUTER_AUTO_OFFSET_RESET:-earliest}
      BOI_API_URL: http://boi-api:8000
      BOI_API_SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      ACTION_GATEWAY_URL: http://action-gateway:8100
      ACTION_GATEWAY_SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      AUTO_ROUTE_EVENTS: ${AUTO_ROUTE_EVENTS:-true}
      EVENT_ROUTER_DISPATCH_TIMEOUT_SECONDS: ${EVENT_ROUTER_DISPATCH_TIMEOUT_SECONDS:-300}
      EVENT_ROUTER_AUDIT_TIMEOUT_SECONDS: ${EVENT_ROUTER_AUDIT_TIMEOUT_SECONDS:-10}
      EVENT_ROUTER_ENRICH_TIMEOUT_SECONDS: ${EVENT_ROUTER_ENRICH_TIMEOUT_SECONDS:-60}
      EVENT_ROUTER_CONSUMER_SESSION_TIMEOUT_MS: ${EVENT_ROUTER_CONSUMER_SESSION_TIMEOUT_MS:-60000}
      EVENT_ROUTER_CONSUMER_HEARTBEAT_INTERVAL_MS: ${EVENT_ROUTER_CONSUMER_HEARTBEAT_INTERVAL_MS:-10000}
      EVENT_ROUTER_CONSUMER_MAX_POLL_INTERVAL_MS: ${EVENT_ROUTER_CONSUMER_MAX_POLL_INTERVAL_MS:-900000}
    networks: [boi-net]

volumes:
  langflow-postgres-data:

networks:
  boi-net:
    driver: bridge
