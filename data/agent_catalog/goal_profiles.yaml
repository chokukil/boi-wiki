goal_profiles:
  - goal_type: workflow_manual_summary
    intent: workflow_explain
    route: fast
    response_profile: workflow_manual_summary
    priority: 90
    description: Workflow Status 화면에서 남은 수동 조치와 승인/담당자 확인 업무를 일반 업무 관점으로 정리합니다.
    match:
      page_kinds: ["workflow_status"]
      any_keyword_groups:
        - ["수동 조치", "manual handoff", "handoff", "핸드오프", "조치 사항", "조치 항목", "조치 내용"]
        - ["남은", "남았", "남아", "정리", "요약", "근거", "자세히", "업무 관점", "일반 업무", "없다고"]

  - goal_type: sop_mermaid_diagram
    intent: diagram
    route: deep
    response_profile: artifact_generation
    priority: 80
    description: SOP/Workflow 정의 업무 흐름을 Mermaid 다이어그램으로 생성합니다.
    match:
      keywords: ["mermaid", "머메이드", "flowchart", "다이어그램", "도식", "프로세스 플로우", "프로세스플로우", "그려", "그려줘"]

  - goal_type: workflow_relationship_summary
    intent: workflow_explain
    route: deep
    response_profile: workflow_summary
    priority: 70
    description: Event, SOP, Action, Manual Handoff, 다음 Event 관계를 설명합니다.
    match:
      any_keyword_groups:
        - ["event", "이벤트", "action", "액션", "업무 요청", "manual handoff", "수동 조치", "조치"]
        - ["관계", "흐름", "연결", "발생하면", "뭘 해야", "무엇을 해야", "업무 흐름", "워크플로우", "요약", "정리", "표"]

  - goal_type: action_spec_gap_check
    intent: gap_check
    route: deep
    response_profile: gap_table
    priority: 75
    description: SOP/Workflow 정의 실행에 필요한 Action/Event/evidence 명세의 부족한 부분을 점검합니다.
    match:
      keywords: ["부족", "누락", "없는지", "없나", "gap", "갭", "action spec", "액션 spec", "명세", "완성도"]

  - goal_type: action_requirement_lookup
    intent: page_qa
    route: fast
    response_profile: action_requirements
    priority: 78
    description: 현재 SOP/Workflow 정의의 Action을 실행하거나 판단할 때 필요한 입력 데이터와 결과 계약을 정리합니다.
    match:
      any_keyword_groups:
        - ["trend", "트렌드", "response trend", "필요 데이터", "어떤 데이터", "입력값", "필수 입력", "결과 계약", "데이터가 필요"]
        - ["필요", "알려", "확인", "데이터", "입력", "계약"]

  - goal_type: trace_reasoning
    intent: trace_reasoning
    route: deep
    response_profile: trace_reasoning
    priority: 60
    description: trace, workflow status, action raw, generated BoI 근거를 모아 원인/진행/판단을 분석합니다.
    match:
      keywords: ["trace", "트레이스", "workflow status", "로그", "왜", "원인", "리스크", "시뮬레이션", "추론", "판단"]

  - goal_type: assigned_work_inbox
    intent: inbox
    route: inbox
    response_profile: task_cards
    priority: 65
    description: 현재 사용자가 처리해야 할 업무, 승인, 수동 조치 대기 항목을 보여줍니다.
    match:
      keywords: ["내 action", "내 액션", "내 할 일", "할 일", "처리해야", "inbox", "대기", "담당"]

  - goal_type: event_type_authoring
    intent: event_type_draft
    route: approval_required
    response_profile: confirmation_required
    priority: 70
    description: 신규 Event Type 초안과 검증 흐름을 제안합니다.
    match:
      any_keyword_groups:
        - ["event type", "event-type", "이벤트 타입", "이벤트 유형", "이벤트 정의", "신규 이벤트"]
        - ["초안", "만들", "생성", "정의", "추가", "draft", "create"]

  - goal_type: wiki_search
    intent: search
    route: fast
    response_profile: search
    priority: 10
    description: BoI Wiki 문서, SOP, Event, Action, Dictionary, runtime evidence를 검색합니다.
    match:
      keywords: ["찾", "검색", "링크", "목록", "어디", "보여줘"]

  - goal_type: page_summary
    intent: summarize
    route: fast
    response_profile: doc_summary
    priority: 10
    description: 현재 페이지나 검색 결과를 요약합니다.
    match:
      keywords: ["요약", "정리", "summary", "summarize"]

  - goal_type: page_question_answer
    intent: page_qa
    route: fast
    response_profile: qa
    priority: 1
    description: 현재 페이지를 근거로 간단한 질문에 답합니다.
    match:
      page_kinds: ["doc", "workflow_status", "events", "event_type", "action_raw", "home", "unknown"]
