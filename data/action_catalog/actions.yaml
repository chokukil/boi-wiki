actions:
  - action_key: boi.materialize_event
    name_ko: Event를 BoI로 자산화
    description: 업무 이벤트를 OKF 기반 BoI 문서로 생성하는 1급 BoI Writer Connector. Langflow/API/Webhook/MCP와 동등한 실행 대상이다.
    type: boi_materialize
    connector_kind: boi_writer
    execution_mode: gateway
    doc_ref: boi:public:actions:boi-writer:materialize-event
    enabled: true
    event_types: ["*"]
    order: 10
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    dry_run_default: false

  - action_key: langflow.meeting_writer.sample
    name_ko: Langflow 회의 BoI Writer Flow 호출 예시
    description: Langflow Webhook Flow를 연결하는 1급 Connector 예시. flow_id를 넣고 enabled=true로 바꾸면 Event Router가 직접 호출한다.
    type: langflow_webhook
    connector_kind: langflow
    execution_mode: gateway
    doc_ref: boi:public:actions:langflow:meeting-writer-sample
    enabled: false
    event_types: [meeting.closed.v1]
    flow_id: ${payload.langflow_flow_id}
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    dry_run_default: false

  - action_key: mcp.boi_search.sample
    name_ko: MCP 기반 BoI 검색 Tool 호출 예시
    description: BoI Wiki MCP 서버의 BoI 검색 tool을 Action Gateway에서 호출하는 connector 예시.
    type: mcp_tool
    connector_kind: mcp
    execution_mode: gateway
    doc_ref: boi:public:actions:mcp:boi-search-sample
    enabled: true
    auto_dispatch: false
    event_types: [report.requested.v1, maintenance.guide.requested.v1]
    url: http://boi-wiki-mcp:8200/api/mcp/call
    headers:
      x-service-token: ${service_token}
    tool_name: boi.search
    arguments:
      query: ${payload.query}
      employee_id: ${employee_id}
      allowed_visibility: [public, team, private]
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    dry_run_default: true

  - action_key: mcp.timesfm.forecast
    name_ko: TimesFM 시계열 예측
    description: TimesFM MCP 서버를 통해 업무 시계열 데이터를 forecast하는 opt-in MCP action. 실제 MCP URL은 runtime 환경변수로만 주입한다.
    type: mcp_tool
    connector_kind: mcp
    execution_mode: gateway
    doc_ref: boi:public:actions:mcp:timesfm-forecast
    enabled: true
    auto_dispatch: false
    order: 65
    event_types: [timeseries.forecast.requested.v1, trend.anomaly.detected.v1, direct_development.result_check.requested.v1, direct_development.fab_trend.compare_requested.v1]
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    dry_run_default: false
    timeout_seconds: 45
    sse_read_timeout_seconds: 120
    transport: sse
    mcp_server:
      name: timesfm
      transport: sse
      url: ${timesfm_mcp_url}
    tool_name: forecast
    arguments:
      series: ${payload.series}
      horizon: ${payload.horizon}
      frequency: ${payload.frequency}
      timestamp_column: ${payload.timestamp_column}
      target_column: ${payload.target_column}
      group_id: ${payload.group_id}
      confidence_level: ${payload.confidence_level}
      context: ${payload.context}
    forecast_usage:
      opt_in: true
      trigger_field: forecast_required
      notes: "기존 SOP event에는 자동 dispatch하지 않고, 명시 forecast event 또는 payload.forecast_required=true 경로에서만 호출한다."

  - action_key: sop.equipment.request_trend_history
    name_ko: Trend / 이력 확인 요청
    description: 장비/공정 Trend와 Lot/Wafer 이력을 조회하는 시스템 API 호출 예시
    type: api
    connector_kind: api
    execution_mode: gateway
    doc_ref: boi:public:actions:api:request-trend-history
    enabled: true
    auto_dispatch: true
    order: 20
    method: POST
    url: http://boi-api:8000/api/poc/equipment/trend-history
    headers:
      x-service-token: ${service_token}
      Content-Type: application/json
    dry_run: false
    body:
      request_id: ${request_id}
      employee_id: ${employee_id}
      event: ${event}
      payload: ${payload}
      dry_run: ${dry_run}
      approved_by: ${approved_by}
    event_types: [equipment.alarm.raised.v1, trend.anomaly.detected.v1, root_cause.analysis.requested.v1]
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    mock_response:
      trend_status: anomaly_detected
      lot_history_ref: /mock/vision-inspection/lot-history/${payload.lot_id}
      wafer_history_ref: /mock/vision-inspection/wafer-history/${payload.wafer_id}
      message: Trend와 이력 데이터를 확인했습니다.

  - action_key: sop.equipment.request_raw_data
    name_ko: Raw / Source Data 확인 요청
    description: 비전 검사 시스템/품질 시스템/설비 시스템의 Raw Data와 Source Data를 조회하는 API 호출 예시
    type: api
    connector_kind: api
    execution_mode: gateway
    doc_ref: boi:public:actions:api:request-raw-data
    enabled: true
    auto_dispatch: true
    order: 30
    method: POST
    url: http://boi-api:8000/api/poc/equipment/raw-data
    headers:
      x-service-token: ${service_token}
      Content-Type: application/json
    dry_run: false
    body:
      request_id: ${request_id}
      employee_id: ${employee_id}
      event: ${event}
      payload: ${payload}
      dry_run: ${dry_run}
      approved_by: ${approved_by}
    event_types: [equipment.alarm.raised.v1, root_cause.analysis.requested.v1, maintenance.guide.requested.v1]
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    mock_response:
      raw_data_ref: /mock/vision-inspection/raw-data/${payload.equipment_id}/${payload.lot_id}
      source_data_ref: /mock/quality-system/source-data/${payload.equipment_id}
      message: Raw/Source Data 참조 링크를 생성했습니다.

  - action_key: sop.equipment.create_root_cause_event
    name_ko: 원인 분석 이벤트 발행
    description: 이상 징후 이벤트를 root_cause.analysis.requested.v1 이벤트로 전환하여 다음 workflow 단계를 깨움
    type: event_publish
    connector_kind: event_broker
    execution_mode: gateway
    doc_ref: boi:public:actions:event-broker:create-root-cause-event
    enabled: true
    auto_dispatch: true
    order: 40
    timeout_seconds: 120
    event_types: [equipment.alarm.raised.v1, trend.anomaly.detected.v1]
    owner: AIX 확산 TF
    risk_level: medium
    approval_required: false
    dry_run: false
    body:
      event_type: root_cause.analysis.requested.v1
      trace_id: ${event.trace_id}
      payload:
        title: 원인 분석 요청 - ${payload.equipment_id}
        equipment_id: ${payload.equipment_id}
        lot_id: ${payload.lot_id}
        wafer_id: ${payload.wafer_id}
        alarm_code: ${payload.alarm_code}
        owner: ${payload.owner}
      source_refs:
        - type: event
          ref: ${event.event_id}

  - action_key: sop.equipment.create_maintenance_guide_event
    name_ko: 장비 보전 가이드 이벤트 발행
    description: 원인 분석 요청을 보전 가이드 요청 이벤트로 전환하여 SOP 다음 단계를 깨움
    type: event_publish
    connector_kind: event_broker
    execution_mode: gateway
    doc_ref: boi:public:actions:event-broker:create-maintenance-guide-event
    enabled: true
    auto_dispatch: true
    order: 40
    timeout_seconds: 120
    event_types: [root_cause.analysis.requested.v1]
    owner: AIX 확산 TF
    risk_level: medium
    approval_required: false
    dry_run: false
    body:
      event_type: maintenance.guide.requested.v1
      trace_id: ${event.trace_id}
      payload:
        title: 장비 보전 가이드 요청 - ${payload.equipment_id}
        equipment_id: ${payload.equipment_id}
        lot_id: ${payload.lot_id}
        wafer_id: ${payload.wafer_id}
        alarm_code: ${payload.alarm_code}
        owner: ${payload.owner}
      source_refs:
        - type: event
          ref: ${event.event_id}

  - action_key: sop.equipment.request_maintenance_guide
    name_ko: 장비 보전 가이드 요청
    description: 장비 이상 가능성이 있을 때 장비 보전 SOP/가이드를 요청하는 API 호출 예시
    type: api
    connector_kind: api
    execution_mode: gateway
    doc_ref: boi:public:actions:api:request-maintenance-guide
    enabled: true
    auto_dispatch: true
    order: 20
    method: POST
    url: http://boi-api:8000/api/poc/equipment/maintenance-guide
    headers:
      x-service-token: ${service_token}
      Content-Type: application/json
    dry_run: false
    body:
      request_id: ${request_id}
      employee_id: ${employee_id}
      event: ${event}
      payload: ${payload}
      dry_run: ${dry_run}
      approved_by: ${approved_by}
    event_types: [root_cause.analysis.requested.v1, root_cause.analysis.completed.v1, maintenance.guide.requested.v1]
    owner: AIX 확산 TF
    risk_level: medium
    approval_required: false
    mock_response:
      guide_boi_ref: boi:public:sop:equipment-abnormal-response
      recommended_steps:
        - Source Data 확인
        - 장비 이력 확인
        - 장비 이상 여부 판단
      message: 장비 보전 가이드를 반환했습니다.

  - action_key: sop.equipment.create_corrective_action_event
    name_ko: 이상 조치 요청 이벤트 발행
    description: 보전 가이드 요청을 이상 조치 요청 이벤트로 전환하여 담당자 알림과 고위험 후보를 기록
    type: event_publish
    connector_kind: event_broker
    execution_mode: gateway
    doc_ref: boi:public:actions:event-broker:create-corrective-action-event
    enabled: true
    auto_dispatch: true
    order: 40
    timeout_seconds: 120
    event_types: [maintenance.guide.requested.v1]
    owner: AIX 확산 TF
    risk_level: medium
    approval_required: false
    dry_run: false
    body:
      event_type: corrective_action.requested.v1
      trace_id: ${event.trace_id}
      payload:
        title: 이상 조치 요청 - ${payload.equipment_id}
        equipment_id: ${payload.equipment_id}
        lot_id: ${payload.lot_id}
        wafer_id: ${payload.wafer_id}
        alarm_code: ${payload.alarm_code}
        owner: ${payload.owner}
      source_refs:
        - type: event
          ref: ${event.event_id}

  - action_key: sop.equipment.notify_action_owner
    name_ko: 이상 조치 담당자 알림
    description: 조치 담당자에게 이상 조치 요청을 발송하는 Webhook/API 호출 예시
    type: api
    connector_kind: api
    execution_mode: gateway
    doc_ref: boi:public:actions:api:notify-action-owner
    enabled: true
    auto_dispatch: true
    order: 20
    method: POST
    url: http://boi-api:8000/api/poc/equipment/notify-owner
    headers:
      x-service-token: ${service_token}
      Content-Type: application/json
    dry_run: false
    body:
      request_id: ${request_id}
      employee_id: ${employee_id}
      event: ${event}
      payload: ${payload}
      dry_run: ${dry_run}
      approved_by: ${approved_by}
    event_types: [corrective_action.requested.v1, promotion.requested.v1]
    owner: AIX 확산 TF
    risk_level: medium
    approval_required: false
    mock_response:
      notification_status: sent
      recipient: ${payload.owner}
      message: 이상 조치 요청 알림을 발송했습니다.

  - action_key: sop.equipment.block_process_progress
    name_ko: 공정 진행 금지 요청
    description: 이상 조치 Agent가 공정 진행 금지를 요청하는 고위험 Action. PoC에서는 승인 전 dry-run만 허용.
    type: api
    connector_kind: api
    execution_mode: gateway
    doc_ref: boi:public:actions:api:block-process-progress
    requires_manual_action: manual.equipment.approve_process_hold
    enabled: true
    auto_dispatch: true
    order: 90
    method: POST
    url: http://boi-api:8000/api/poc/equipment/process-hold
    headers:
      x-service-token: ${service_token}
      Content-Type: application/json
    body:
      request_id: ${request_id}
      employee_id: ${employee_id}
      event: ${event}
      payload: ${payload}
      dry_run: ${dry_run}
      approved_by: ${approved_by}
    event_types: [corrective_action.requested.v1]
    owner: 제조/품질 담당 조직
    risk_level: high
    approval_required: true
    mock_response:
      requested_state: process_hold
      equipment_id: ${payload.equipment_id}
      message: 승인 필요 Action입니다. PoC에서는 dry-run으로만 기록합니다.

  - action_key: sop.equipment.change_spec_rule
    name_ko: Spec / Rule 변경 요청
    description: Spec/Rule 변경은 고위험 Action으로 승인과 변경관리 절차가 필요. PoC에서는 dry-run만 허용.
    type: api
    connector_kind: api
    execution_mode: gateway
    doc_ref: boi:public:actions:api:change-spec-rule
    requires_manual_action: manual.equipment.approve_spec_rule_change
    enabled: true
    auto_dispatch: true
    order: 95
    method: POST
    url: http://boi-api:8000/api/poc/equipment/spec-rule-change
    headers:
      x-service-token: ${service_token}
      Content-Type: application/json
    body:
      request_id: ${request_id}
      employee_id: ${employee_id}
      event: ${event}
      payload: ${payload}
      dry_run: ${dry_run}
      approved_by: ${approved_by}
    event_types: [corrective_action.requested.v1]
    owner: 제조/품질 담당 조직
    risk_level: high
    approval_required: true
    mock_response:
      requested_change: spec_rule_change
      equipment_id: ${payload.equipment_id}
      message: 변경관리 승인 필요 Action입니다. PoC에서는 dry-run으로만 기록합니다.

  - action_key: langflow.boi.reference_flow
    name_ko: Langflow Reference Flow 호출
    description: 최신 BoI Reference Flow를 Langflow API에서 resolve해 OpenAI-compatible Gemma LLM으로 이벤트 맥락 요약을 생성하는 실행형 Connector
    type: langflow_run
    connector_kind: langflow
    execution_mode: gateway
    doc_ref: boi:public:actions:langflow:reference-flow
    enabled: true
    auto_dispatch: true
    order: 35
    event_types: [meeting.closed.v1, equipment.alarm.raised.v1, report.requested.v1]
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    dry_run: false
    timeout_seconds: 90
    flow_name: BoI Reference Flow
    resolve_latest: true
    require_model: google/gemma-4-26b-a4b-qat
    require_marker: BoI Wiki Writer
    body:
      input_value: "BoI Wiki Event를 분석해 Private BoI 초안 요약을 한국어로 작성하세요. event_type=${event.event_type}, trace_id=${event.trace_id}, title=${payload.title}, equipment_id=${payload.equipment_id}, owner=${payload.owner}"
      input_type: chat
      output_type: chat
      tweaks:
        BoIContextNormalizer-boi:
          manual_input: "event_type=${event.event_type}, trace_id=${event.trace_id}, title=${payload.title}, equipment_id=${payload.equipment_id}, owner=${payload.owner}"
        BoIWikiReader-boi:
          query: "BoI Wiki SOP harness action Langflow"
        BoIActionInvoker-boi:
          action_key: manual.equipment.confirm_alarm_context
          dry_run: true

  - action_key: langflow.equipment.stage_analysis
    name_ko: Langflow 설비 SOP Stage 분석
    description: 설비 SOP stage의 event payload, prior API/action results, manual handoff 요구사항을 받아 분석/가이드/조치 후보 초안을 생성하는 실행형 Connector
    type: langflow_run
    connector_kind: langflow
    execution_mode: gateway
    doc_ref: boi:public:actions:langflow:stage-analysis
    enabled: true
    auto_dispatch: true
    order: 35
    event_types: [root_cause.analysis.requested.v1, maintenance.guide.requested.v1, corrective_action.requested.v1]
    owner: AIX 확산 TF / 제조 PoC
    risk_level: low
    approval_required: false
    dry_run: false
    timeout_seconds: 90
    flow_name: BoI Equipment Stage Analysis Flow
    resolve_latest: true
    require_model: google/gemma-4-26b-a4b-qat
    require_marker: BoI Wiki Writer
    body:
      input_value: |
        설비 이상 대응 SOP의 현재 stage 실행 기록을 한국어로 작성하세요.
        범위는 분석/가이드/조치 후보 초안으로 제한하고, 고위험 system action은 승인 필요로만 표시하세요.
        금지: 업무 맥락 자산화, Event Broker, Action Gateway, Private BoI/Team BoI 승격, PoC 아키텍처, 작성자 문구를 설명하지 마세요.
        출력 구조: Current Finding, Evidence Used, Recommended Next Check, Manual Handoff, Risk/Approval Notes.

        Event:
        - event_type=${event.event_type}
        - trace_id=${event.trace_id}
        - title=${payload.title}
        - equipment_id=${payload.equipment_id}
        - lot_id=${payload.lot_id}
        - wafer_id=${payload.wafer_id}
        - alarm_code=${payload.alarm_code}
        - owner=${payload.owner}

        Prior Action Results:
        ${prior_results_json}
      input_type: chat
      output_type: chat
      tweaks:
        BoIContextNormalizer-boi:
          manual_input: |
            event_type=${event.event_type}
            trace_id=${event.trace_id}
            title=${payload.title}
            equipment_id=${payload.equipment_id}
            lot_id=${payload.lot_id}
            wafer_id=${payload.wafer_id}
            alarm_code=${payload.alarm_code}
            owner=${payload.owner}
            prior_results=${prior_results_json}
        BoIWikiReader-boi:
          query: "equipment abnormal response SOP root cause maintenance guide"
        BoIActionInvoker-boi:
          action_key: manual.equipment.review_root_cause
          dry_run: true

  - action_key: connector.mcp.sample
    name_ko: MCP Bridge 호출 예시
    description: MCP 서버/툴 호출은 Action Gateway가 MCP Bridge를 통해 호출하도록 등록한다. PoC 기본값은 비활성화.
    type: mcp_bridge
    connector_kind: mcp
    execution_mode: gateway
    doc_ref: boi:public:actions:mcp:bridge-sample
    enabled: false
    auto_dispatch: false
    order: 60
    event_types: [report.requested.v1]
    owner: AIX 확산 TF
    risk_level: medium
    approval_required: false
    url: http://boi-wiki-mcp:8200/api/mcp/call
    server:
      name: boi-wiki-mcp
    tool: search_boi
    arguments:
      query: ${payload.query}
      employee_id: ${employee_id}

  - action_key: boi.publish_event
    name_ko: Event Broker로 이벤트 발행
    description: Agent/Langflow/API에서 업무 이벤트를 Event Broker로 발행하는 공통 Action
    type: event_publish
    connector_kind: event_broker
    execution_mode: gateway
    doc_ref: boi:public:actions:event-broker:publish-event
    enabled: true
    auto_dispatch: false
    order: 100
    timeout_seconds: 120
    event_types: [manual.input.v1]
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    dry_run: false
    body:
      event_type: ${payload.event_type}
      trace_id: ${payload.trace_id}
      payload: ${payload.payload}
      source_refs: ${payload.source_refs}

  - action_key: webhook.inbound.external_event
    name_ko: 외부 Webhook 이벤트 수신
    description: 외부 시스템이 BoI API inbound webhook으로 업무 이벤트를 전달하는 명세. 실제 수신은 /api/webhooks/{source}에서 처리한다.
    type: internal_webhook
    connector_kind: webhook
    execution_mode: inbound
    doc_ref: boi:public:actions:webhook:inbound-external-event
    enabled: false
    auto_dispatch: false
    order: 110
    event_types: [external.webhook.received.v1]
    owner: AIX 확산 TF
    risk_level: low
    approval_required: false
    dry_run_default: false

  - action_key: manual.equipment.confirm_alarm_context
    name_ko: Alarm / Trend / 이력 맥락 확인
    description: 담당자가 설비 Alarm, Trend, Lot/Wafer 이력 맥락을 확인하는 manual action
    type: manual_task
    connector_kind: manual
    execution_mode: human
    doc_ref: boi:public:actions:manual:confirm-alarm-context
    enabled: true
    auto_dispatch: false
    order: 120
    event_types: [equipment.alarm.raised.v1, trend.anomaly.detected.v1]
    owner: AIX 확산 TF / 제조 PoC
    risk_level: low
    approval_required: false
    dry_run_default: true
    checklist:
      - Alarm 발생 시간과 설비 ID 확인
      - Trend/Raw Data 조회 결과 확인
